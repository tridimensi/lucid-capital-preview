<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucid Capital Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #080712;
      color: white;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: min(90%, 720px);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 42px;
    }

    p {
      margin-bottom: 32px;
      color: rgba(255,255,255,0.65);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.05);
    }

    a:hover {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1>Lucid Capital Preview</h1>
    <p>Select one of the hero section variations below.</p>

    <div class="grid">
      <a href="./v1/">Version 1</a>
      <a href="./v2/">Version 2</a>
      <a href="./v3/">Version 3</a>
      <a href="./v4/">Version 4</a>
      <a href="./v5/">Version 5</a>
      <a href="./v6/">Version 6</a>
      <a href="./v7/">Version 7</a>
    </div>
  </main>
</body>
</html>
